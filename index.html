<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Intercom v64 - Hold-to-Talk Edition</title>
    <style>
        :root { 
            --bg-main: #FFFFFF; 
            --text-main: #000000; 
            --accent: #ccff00; 
            --btn-op: #1a1a1a; 
            --danger: #ff3333; 
            --proceed: #0055ff; 
            --holding: #ff2200;
        }
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            margin: 0; 
            background: #000; 
            touch-action: manipulation; 
            overflow: hidden; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* Cooldown & Visual Toast Notifications */
        .cooldown-active { pointer-events: none !important; opacity: 0.7; }
        #statusMsg { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.95); color: #ccff00; padding: 18px 45px; 
            border-radius: 50px; display: none; z-index: 9999; font-weight: 900; 
            border: 4px solid #ccff00; font-size: 1.6rem; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes pulse-red {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px red); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 25px red); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px red); }
        }
        .pulse { animation: pulse-red 2s infinite ease-in-out; }

        /* Admin Dashboard Panels */
        #adminPanel { 
            padding: 15px; 
            background: #fdfdfd; 
            border-bottom: 4px solid #000; 
            position: relative; 
            z-index: 5000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #button-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 8px; 
            padding: 10px 0; 
            max-height: 150px; 
            overflow-y: auto; 
        }
        .admin-item { 
            background:#f1f1f1; 
            padding:8px 12px; 
            border:2px solid #000; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
            border-radius:10px; 
            font-size:0.95rem; 
            font-weight: bold;
        }
        .del-btn { 
            background:var(--danger); 
            color:white; 
            border:2px solid #000; 
            border-radius:6px; 
            cursor:pointer; 
            padding:3px 8px; 
            font-weight:bold; 
        }

        /* State containers for UI flow */
        .state-container { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-main); 
            color: var(--text-main); 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 4000; 
            box-sizing: border-box;
        }
        .active { display: flex !important; }

        /* Elegant Cards & Text Boxes */
        .script-box { 
            background: #fff; 
            padding: 25px; 
            border-radius: 25px; 
            border: 8px solid #000; 
            width: 90%; 
            max-width: 700px;
            font-size: 28px; 
            font-weight: 700; 
            text-align: center; 
            color: #000; 
            line-height: 1.4; 
            box-shadow: 10px 10px 0px #000; 
            box-sizing: border-box; 
            z-index: 4001; 
            margin-bottom: 20px;
        }

        /* Press to Talk Interactive Elements */
        .ptt-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
        }
        .ptt-btn {
            background: var(--accent);
            color: #000;
            border: 6px solid #000;
            padding: 25px 50px;
            font-size: 2rem;
            font-weight: 900;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 12px 0px #000;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .ptt-btn:active, .ptt-btn.holding {
            background: var(--holding) !important;
            color: #fff !important;
            transform: translateY(8px);
            box-shadow: 0 4px 0px #000;
        }
        .ptt-instruction {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            text-align: center;
        }

        /* Operator selection screen elements */
        .op-list { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(5, 1fr); 
            width: 95vw; 
            height: 55vh; 
            gap: 12px; 
            padding: 5px; 
        }
        .op-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--btn-op); 
            color: var(--accent); 
            border: 4px solid #000; 
            font-size: 1.3rem; 
            font-weight: 900; 
            border-radius: 12px; 
            cursor: pointer; 
            text-align: center; 
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s;
        }
        .op-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }
        
        .page-nav-btn { 
            background: #ddd; 
            color: #000; 
            border: 4px solid #000; 
            padding: 12px 35px; 
            font-size: 1.6rem; 
            font-weight: 900; 
            border-radius: 15px; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px #000;
        }
        .active-page { background: var(--accent) !important; }
        
        /* Audio Visualizer Bar */
        .meter-container { 
            width: 80%; 
            max-width: 600px;
            height: 35px; 
            background: #eee; 
            border-radius: 20px; 
            margin: 15px 0; 
            border: 5px solid #000; 
            position: relative; 
            overflow: hidden;
        }
        #volumeBar { width: 0%; height: 100%; background: #00cc00; transition: width 0.05s ease; }
        
        .manual-reset { 
            background: var(--danger); 
            color: white; 
            border: 4px solid #000; 
            padding: 12px 30px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 15px; 
            position: relative; 
            z-index: 4500; 
            box-shadow: 4px 4px 0px #000;
        }
        .manual-reset:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Modal Overlay UI (Replaces default alert/confirm) */
        #confirmOverlay, #alertOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center;
        }
        .confirm-box, .alert-box {
            background: white; padding: 40px; border-radius: 30px; border: 10px solid #000;
            text-align: center; max-width: 85%; width: 500px; box-shadow: 15px 15px 0px #000;
        }
    </style>
</head>
<body onmousemove="resetInactivityTimer()" onclick="resetInactivityTimer()" ontouchstart="resetInactivityTimer()">

    <!-- Screen Feedback Toast -->
    <div id="statusMsg">PLEASE WAIT...</div>

    <!-- Custom System Alerts (Replacing standard alert dialogue) -->
    <div id="alertOverlay">
        <div class="alert-box">
            <h1 id="alertTitle" style="font-size: 2.2rem; margin-bottom: 20px; font-weight:900; color:var(--danger)">ALERT</h1>
            <p id="alertBody" style="font-size: 1.4rem; font-weight:700; margin-bottom:30px;">System notification details.</p>
            <button onclick="closeAlert()" style="background:var(--proceed); color:white; border:4px solid #000; padding:15px 35px; font-size:1.6rem; font-weight:900; border-radius:15px; cursor:pointer; width:100%;">OK</button>
        </div>
    </div>

    <!-- Custom Call Confirmations -->
    <div id="confirmOverlay">
        <div class="confirm-box">
            <h1 style="font-size: 3rem; margin-bottom: 30px; font-weight:900;">CALL <span id="confirmName" style="color:var(--proceed)">NAME</span>?</h1>
            <div style="display: flex; gap: 20px; justify-content: center; width:100%;">
                <button onclick="executeCall()" style="background:var(--proceed); color:white; border:4px solid #000; padding:20px 40px; font-size:2rem; font-weight:900; border-radius:15px; cursor:pointer; flex: 1;">YES</button>
                <button onclick="closeConfirm()" style="background:var(--danger); color:white; border:4px solid #000; padding:20px 40px; font-size:2rem; font-weight:900; border-radius:15px; cursor:pointer; flex: 1;">NO</button>
            </div>
        </div>
    </div>

    <!-- Interactive Administration Console Header -->
    <div id="adminPanel">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="nameInput" placeholder="Add Teacher..." style="padding:10px; flex-grow:1; border:3px solid #000; border-radius:8px; font-size:1.1rem; font-weight:bold;">
            <button onclick="addTeacher()" style="background:green; color:white; border:3px solid #000; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">ADD</button>
            <button onclick="openTV()" style="background:blue; color:white; border:3px solid #000; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">1. OPEN TV</button>
            <button onclick="startOperator()" style="background:black; color:white; border:3px solid #000; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">2. START</button>
        </div>
        <div id="button-grid"></div>
    </div>

    <!-- Phase 1: Interactive Doorbell -->
    <div id="state-1" class="state-container">
        <button class="pulse" style="font-size:150px; background:none; border:none; cursor:pointer; outline:none;" onclick="handleDoorbellClick()">🔔</button>
        <h1 style="font-size: 3.5rem; font-weight: 900;">TAP TO START</h1>
    </div>

    <!-- Phase 2: Hold to Speak and Broadcast -->
    <div id="state-2" class="state-container">
        <div class="script-box">
            "Good morning! I am <b>(Name)</b>,<br>
            from <b>(Section)</b>.<br>
            <b>(My Purpose)</b>"
        </div>
        <div class="meter-container">
            <div id="volumeBar"></div>
        </div>
        
        <div class="ptt-container">
            <div class="ptt-instruction">👇 Press & hold button to deliver your message:</div>
            <button id="holdToTalkBtn" class="ptt-btn">
                <span>🎤 HOLD TO SPEAK</span>
            </button>
        </div>

        <button class="manual-reset" onclick="manualReset()">RESET</button>
    </div>

    <!-- Phase 3: Operator Directory Navigation -->
    <div id="state-3" class="state-container">
        <h2 style="font-size: 2.2rem; font-weight:900; margin-bottom: 15px;">WHO ARE YOU LOOKING FOR?</h2>
        <div id="op-list-container" class="op-list"></div>
        <div style="display:flex; gap:20px; margin:20px 0;">
            <button id="pg1Btn" class="page-nav-btn active-page" onclick="changePage(1)">PAGE 1</button>
            <button id="pg2Btn" class="page-nav-btn" onclick="changePage(2)">PAGE 2</button>
        </div>
        <button class="manual-reset" onclick="manualReset()">CANCEL</button>
    </div>

    <!-- Internal audio triggers -->
    <audio id="sndDoorbell" src="sounds/bell.mp3"></audio>
    <audio id="sndChime" src="sounds/chime.mp3"></audio>

<script>
    let tvWindow = null;
    let teachers = JSON.parse(localStorage.getItem('teachers')) || [];
    let localStream = null;
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let animationId = null;
    let tvResetTimer = null;
    let inactivityTimer = null;
    let currentPage = 1;
    let isCooldown = false;
    let selectedName = ""; 
    let currentState = 1;
    let isLocked = false;
    let isMediaActive = false;

    // custom Alert system
    function showAlert(title, message) {
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertBody').innerText = message;
        document.getElementById('alertOverlay').style.display = 'flex';
    }
    function closeAlert() {
        document.getElementById('alertOverlay').style.display = 'none';
    }

    function resetInactivityTimer() {
        if (inactivityTimer) clearTimeout(inactivityTimer);
        if (currentState !== 1) {
            inactivityTimer = setTimeout(() => { manualReset(); }, 60000);
        }
    }

    function addTeacher() {
        const n = document.getElementById('nameInput').value.trim();
        if(n) { 
            teachers.push(n); 
            teachers.sort(); 
            saveTeachers(); 
            document.getElementById('nameInput').value=''; 
        }
    }
    
    function deleteTeacher(index) {
        // Implement custom dialogue for deletion rather than standard confirm
        selectedName = teachers[index];
        document.getElementById('confirmName').innerText = `DELETE ${selectedName}`;
        // Temporarily override call execution function
        const originalExec = executeCall;
        executeCall = function() {
            teachers.splice(index, 1); 
            saveTeachers();
            closeConfirm();
            executeCall = originalExec; // Restore original call flow
        };
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function saveTeachers() { 
        localStorage.setItem('teachers', JSON.stringify(teachers)); 
        renderAdmin(); 
    }

    function renderAdmin() {
        const grid = document.getElementById('button-grid');
        grid.innerHTML = '';
        teachers.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = 'admin-item';
            d.innerHTML = `<span>${t}</span><button class="del-btn" onclick="deleteTeacher(${i})">X</button>`;
            grid.appendChild(d);
        });
    }

    function speakName(name) {
        const cleanName = name.toLowerCase().replace(/'/g, "").replace(/ /g, "_");
        const audio = new Audio("sounds/" + cleanName + ".mp3");
        let playCount = 0;
        const playTwice = () => {
            if (playCount < 2) {
                audio.play().then(() => {
                    playCount++;
                    audio.onended = () => { if(playCount < 2) setTimeout(playTwice, 800); };
                }).catch(() => { runTTSFallback(name); });
            }
        };
        playTwice();
    }

    function runTTSFallback(name) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance("Calling " + name);
            u.rate = 0.85; 
            window.speechSynthesis.speak(u);
            u.onend = () => { 
                setTimeout(() => { 
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Calling " + name)); 
                }, 600); 
            };
        }
    }

    function startCooldown(duration = 3000, message = "CALLING...") {
        isCooldown = true;
        document.body.classList.add('cooldown-active');
        const msgBox = document.getElementById('statusMsg');
        msgBox.innerText = message;
        msgBox.style.display = 'block';
        setTimeout(() => {
            isCooldown = false;
            document.body.classList.remove('cooldown-active');
            msgBox.style.display = 'none';
        }, duration);
    }

    function openConfirm(name) {
        selectedName = name;
        document.getElementById('confirmName').innerText = name;
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirm() { 
        document.getElementById('confirmOverlay').style.display = 'none'; 
    }

    function executeCall() {
        closeConfirm();
        if (isCooldown) return;
        startCooldown(3000, "SENDING COMMAND...");
        document.getElementById('sndChime').play().catch(()=>{});
        setTimeout(() => speakName(selectedName), 1000);
        if(tvWindow) {
            tvWindow.postMessage({type: 'SHOW_NAME', name: selectedName}, '*');
            if(tvResetTimer) clearTimeout(tvResetTimer);
            tvResetTimer = setTimeout(() => { tvWindow.postMessage({type: 'FORCE_WELCOME'}, '*'); }, 30000);
        }
        setUI(1);
    }

    function setUI(state) {
        currentState = state;
        document.querySelectorAll('.state-container').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(`state-${state}`);
        if(target) target.classList.add('active');
        
        // Ensure standard media resets on UI transitions
        if (state === 1 || state === 3) {
            stopMedia();
        }
        resetInactivityTimer();
    }

    function handleDoorbellClick() { 
        if (isCooldown) return; 
        triggerDoorbell(); 
    }

    function triggerDoorbell() {
        document.getElementById('sndDoorbell').play().catch(() => {});
        setTimeout(() => { 
            setUI(2); 
            // In Phase 2, we display instructions and wait for Hold to Speak action.
        }, 1200);
    }

    // Setup Audio & Video Capture only when Hold is active
    async function startMedia() {
        if (isMediaActive) return;
        isMediaActive = true;
        
        // Notify TV displaying unit to render the feed live
        if(tvWindow) tvWindow.postMessage({type: 'START_VIDEO'}, '*');
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(localStream);
            analyser = audioContext.createAnalyser();
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            drawVolume();
        } catch (err) { 
            console.error("Media permission denied or unavailable", err); 
        }
    }

    function drawVolume() {
        if (!isMediaActive) return;
        animationId = requestAnimationFrame(drawVolume);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a,b) => a+b, 0);
        document.getElementById('volumeBar').style.width = Math.min((sum/dataArray.length)*4, 100) + "%";
    }

    function stopMedia() {
        isMediaActive = false;
        if(animationId) cancelAnimationFrame(animationId);
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        document.getElementById('volumeBar').style.width = "0%";
    }

    // Triggered once user releases the Press-To-Talk switch
    function handlePressRelease() {
        stopMedia();
        // Send transmission confirmation signal to TV screen display
        if(tvWindow) {
            tvWindow.postMessage({type: 'SHOW_MESSAGE_SENT'}, '*');
        }
        // Direct transition to Directory Directory Page
        finalizeIntercom();
    }

    function finalizeIntercom() { 
        renderOpList(); 
        setUI(3); 
    }
    
    function changePage(pg) { 
        currentPage = pg; 
        renderOpList(); 
    }

    function renderOpList() {
        const container = document.getElementById('op-list-container');
        container.innerHTML = '';
        const list = teachers.slice((currentPage - 1) * 20, currentPage * 20);
        document.getElementById('pg1Btn').classList.toggle('active-page', currentPage === 1);
        document.getElementById('pg2Btn').classList.toggle('active-page', currentPage === 2);
        list.forEach(name => {
            const b = document.createElement('div');
            b.className = 'op-btn'; 
            b.innerText = name;
            b.onclick = () => openConfirm(name);
            container.appendChild(b);
        });
    }

    function manualReset() {
        if(tvWindow) tvWindow.postMessage({type: 'FORCE_WELCOME'}, '*');
        if(tvResetTimer) clearTimeout(tvResetTimer);
        closeConfirm();
        setUI(1);
    }

    function openTV() {
        tvWindow = window.open("", "TVDisplay", "width=1200,height=800");
        const scriptEnd = "<\/script>";
        tvWindow.document.write(`
            <html>
            <body style="background:#000; color:#fff; margin:0; overflow:hidden; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; user-select:none;">
                <button onclick="document.documentElement.requestFullscreen()" style="position:fixed; top:10px; right:10px; background:#444; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; opacity:0.3; z-index:10001;">[ ] FULLSCREEN</button>
                
                <div id="main" style="text-align:center; width:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; box-sizing:border-box; padding:20px;">
                    <h1 id="msg" style="font-size:8vw; font-weight:900; margin:0; text-transform:uppercase; letter-spacing:2px;">WELCOME</h1>
                </div>
                
                <video id="v" style="display:none; width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; transform: scaleX(-1);" autoplay playsinline></video>
                
                <script>
                    window.onmessage = (e) => {
                        const m = document.getElementById('msg'); 
                        const v = document.getElementById('v'); 
                        const main = document.getElementById('main');
                        
                        if(e.data.type === 'FORCE_WELCOME') { 
                            v.style.display = 'none'; 
                            v.srcObject = null; 
                            main.style.display = 'flex'; 
                            main.innerHTML = '<h1 style="font-size:8vw; font-weight:900; letter-spacing:2px; margin:0;">WELCOME</h1>'; 
                        }
                        
                        if(e.data.type === 'START_VIDEO') { 
                            main.style.display = 'none'; 
                            v.style.display = 'block'; 
                            navigator.mediaDevices.getUserMedia({video:true}).then(s => { 
                                v.srcObject = s; 
                            }).catch(err => {
                                console.log("Camera access blocked inside iframe context", err);
                            }); 
                        }
                        
                        if(e.data.type === 'STOP_VIDEO') { 
                            if(v.srcObject) v.srcObject.getTracks().forEach(tr => tr.stop()); 
                            v.srcObject = null; 
                            v.style.display = 'none'; 
                        }

                        if(e.data.type === 'SHOW_MESSAGE_SENT') {
                            v.style.display = 'none'; 
                            if(v.srcObject) v.srcObject.getTracks().forEach(tr => tr.stop());
                            v.srcObject = null;
                            main.style.display = 'flex';
                            main.innerHTML = \`
                                <div style="border:1.5vw solid #ccff00; background:rgba(0,0,0,0.85); border-radius:4vw; padding:5vw; display:inline-block; max-width:85vw; animation: pulse-border 1.5s infinite;">
                                    <h1 style="font-size:6vw; color:#ccff00; margin:0 0 20px 0; font-weight:900; text-align:center;">MESSAGE TRANSMITTED 📨</h1>
                                    <p style="font-size:3vw; color:#ffffff; margin:0; font-weight:700; text-align:center;">PLEASE SELECT A PERSON TO NOTIFY</p>
                                </div>
                            \`;
                        }
                        
                        if(e.data.type === 'SHOW_NAME') {
                            v.style.display = 'none'; 
                            main.style.display = 'flex';
                            main.innerHTML = \`
                                <div style="border:1.5vw solid #ccff00; border-radius:4vw; padding:4vw; display:inline-block; max-width:85vw;">
                                    <h1 style="font-size:8vw; color:#ccff00; margin:0; font-weight:900; text-align:center;">\${e.data.name}</h1>
                                    <p style="font-size:3.5vw; color:#ffffff; margin:15px 0 0 0; font-weight:700; text-align:center;">⚠️ INCOMING VISIT ⚠️</p>
                                </div>
                            \`;
                        }
                    }
                \${scriptEnd}
            </body></html>
        `);
    }

    function startOperator() { 
        document.getElementById('adminPanel').style.display = 'none'; 
        // 1. Enter Fullscreen on Main Screen
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(e => console.log("Fullscreen blocked"));
        }
        isLocked = true;
        setUI(1); 
    }

    // Set up interactive Touch and Mouse Bindings for Phase 2 Button
    const pttButton = document.getElementById('holdToTalkBtn');

    // Prevents touch default scaling & fires correct media streams
    function onHoldStart(e) {
        if(e) e.preventDefault();
        pttButton.classList.add('holding');
        pttButton.innerHTML = '<span>🔴 RECORDING LIVE...</span>';
        startMedia();
    }

    function onHoldEnd(e) {
        if(e) e.preventDefault();
        if (pttButton.classList.contains('holding')) {
            pttButton.classList.remove('holding');
            pttButton.innerHTML = '<span>🎤 HOLD TO SPEAK</span>';
            handlePressRelease();
        }
    }

    // Touch Support
    pttButton.addEventListener('touchstart', onHoldStart, { passive: false });
    pttButton.addEventListener('touchend', onHoldEnd, { passive: false });
    pttButton.addEventListener('touchcancel', onHoldEnd, { passive: false });

    // Mouse Support
    pttButton.addEventListener('mousedown', onHoldStart);
    pttButton.addEventListener('mouseup', onHoldEnd);
    pttButton.addEventListener('mouseleave', onHoldEnd);

    // Prevent exit from Fullscreen (re-prompts on exit using custom Modal warning)
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && isLocked) {
            showAlert("SYSTEM WARNING", "SYSTEM LOCK: Tap anywhere on screen to restore full kiosk interface.");
            
            document.body.addEventListener('click', function reEnter() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
                document.body.removeEventListener('click', reEnter);
            }, {once: true});
        }
    });

    renderAdmin();
</script>
</body>
</html>
